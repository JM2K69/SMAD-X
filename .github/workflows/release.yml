name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build – ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore SMAD-X/SMAD-X.csproj

      - name: Publish
        run: >
          dotnet publish SMAD-X/SMAD-X.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -o publish/${{ matrix.rid }}

      - name: Zip artifact (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath SMAD-X-${{ matrix.rid }}.zip

      - name: Zip artifact (Linux / macOS)
        if: matrix.rid != 'win-x64'
        run: zip -r SMAD-X-${{ matrix.rid }}.zip publish/${{ matrix.rid }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SMAD-X-${{ matrix.rid }}
          path: SMAD-X-${{ matrix.rid }}.zip

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SMAD-X ${{ github.ref_name }}"
          body: |
            ## 🚀 SMAD-X ${{ github.ref_name }}

            ### Téléchargements / Downloads

            | Plateforme | Fichier |
            |---|---|
            | 🪟 Windows x64 | `SMAD-X-win-x64.zip` |
            | 🐧 Linux x64   | `SMAD-X-linux-x64.zip` |
            | 🍎 macOS x64   | `SMAD-X-osx-x64.zip` |

            > **macOS** : si nécessaire, exécutez `chmod +x SMAD-X && xattr -d com.apple.quarantine SMAD-X`
          files: artifacts/**/*.zip
          draft: false
          prerelease: false
